version: '3'

info:
  companyName: "Omniview"
  productName: "Omniview"
  productIdentifier: "dev.omniview.app"
  description: "A unified infrastructure management platform"
  copyright: "(c) 2025, Omniview"
  comments: "Omniview Desktop Application"
  version: "0.0.1"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - ui
      - bin
      - dist
      - .task
      - e2e
      - packages
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary

fileAssociations:
  - ext: icns
    name: favicon
    description: AppIcon
    iconName: fileIcon
    role: Editor
